name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Configure (Linux)
      if: runner.os == 'Linux'
      run: cmake -S cpp-src -B cpp-src/build -DCMAKE_BUILD_TYPE=Release

    - name: Configure (Windows)
      if: runner.os == 'Windows'
      run: cmake -S cpp-src -B cpp-src/build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build cpp-src/build --config Release

    - name: Run language feature tests (Linux)
      if: runner.os == 'Linux'
      run: ./cpp-src/build/darix run cpp-src/test_all_features.dax

    - name: Run language feature tests (Windows)
      if: runner.os == 'Windows'
      run: .\cpp-src\build\darix.exe run cpp-src\test_all_features.dax

    - name: Run comprehensive tests (Linux)
      if: runner.os == 'Linux'
      run: |
        ./cpp-src/build/darix run cpp-src/test_native.dax
        ./cpp-src/build/darix run cpp-src/test_array.dax
        ./cpp-src/build/darix run cpp-src/test_string.dax
        ./cpp-src/build/darix run cpp-src/test_map.dax
        ./cpp-src/build/darix run cpp-src/test_set.dax
        ./cpp-src/build/darix run cpp-src/test_json.dax
        ./cpp-src/build/darix run cpp-src/test_fs.dax
        ./cpp-src/build/darix run cpp-src/test_crypto.dax
        ./cpp-src/build/darix run cpp-src/test_datetime.dax
        ./cpp-src/build/darix run cpp-src/test_regex.dax
        ./cpp-src/build/darix run cpp-src/test_encoding.dax

    - name: Run comprehensive tests (Windows)
      if: runner.os == 'Windows'
      run: |
        .\cpp-src\build\darix.exe run cpp-src\test_native.dax
        .\cpp-src\build\darix.exe run cpp-src\test_array.dax
        .\cpp-src\build\darix.exe run cpp-src\test_string.dax
        .\cpp-src\build\darix.exe run cpp-src\test_map.dax
        .\cpp-src\build\darix.exe run cpp-src\test_set.dax
        .\cpp-src\build\darix.exe run cpp-src\test_json.dax
        .\cpp-src\build\darix.exe run cpp-src\test_fs.dax
        .\cpp-src\build\darix.exe run cpp-src\test_crypto.dax
        .\cpp-src\build\darix.exe run cpp-src\test_datetime.dax
        .\cpp-src\build\darix.exe run cpp-src\test_regex.dax
        .\cpp-src\build\darix.exe run cpp-src\test_encoding.dax

    - name: Upload binary (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: darix-linux-amd64
        path: cpp-src/build/darix

    - name: Upload binary (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: darix-windows-amd64
        path: cpp-src/build/darix.exe
