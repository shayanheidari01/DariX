name: Release DariX

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            artifact: darix-linux-amd64
            ext: ""
          - os: windows-latest
            name: windows-amd64
            artifact: darix-windows-amd64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S cpp-src -B cpp-src/build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S cpp-src -B cpp-src/build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cpp-src/build --config Release

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: ./cpp-src/build/darix run cpp-src/test_all_features.dax

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .\cpp-src\build\darix.exe run cpp-src\test_all_features.dax

      - name: Package binary (Linux)
        if: runner.os == 'Linux'
        run: |
          cd cpp-src/build
          tar czf darix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz darix

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "cpp-src\build\darix.exe" -DestinationPath "cpp-src\build\darix-${{ steps.version.outputs.version }}-windows-amd64.zip"

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: darix-${{ steps.version.outputs.version }}-linux-amd64
          path: cpp-src/build/darix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: darix-${{ steps.version.outputs.version }}-windows-amd64
          path: cpp-src/build/darix-${{ steps.version.outputs.version }}-windows-amd64.zip

      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cpp-src/build/darix${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DariX v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## DariX v${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Linux x86_64 | `darix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` | Extract and run `./darix` |
            | Windows x86_64 | `darix-${{ steps.version.outputs.version }}-windows-amd64.zip` | Extract and run `darix.exe` |

            ### Quick Start
            ```bash
            # Linux
            tar xzf darix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            chmod +x darix
            ./darix run your_script.dax

            # Windows
            # Extract the .zip and run darix.exe
            ```

            ### What's New
            See the [CHANGELOG](CHANGELOG.md) for details.

            ### Documentation
            - [Language Reference](docs/language.md)
            - [Module Reference](docs/modules.md)
            - [Build Guide](docs/building.md)
            - [Tutorial](docs/tutorial.md)
          files: |
            artifacts/darix-${{ steps.version.outputs.version }}-linux-amd64/*
            artifacts/darix-${{ steps.version.outputs.version }}-windows-amd64/*
            artifacts/darix-linux-amd64/*
            artifacts/darix-windows-amd64/*
